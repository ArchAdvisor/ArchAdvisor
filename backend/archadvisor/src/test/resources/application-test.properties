# Testcontainers will start Postgres automatically when Spring opens the connection.
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///archadvisor_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# If you use Flyway/Liquibase in main, either enable it here (preferred) or disable it:
# spring.flyway.enabled=true
spring.flyway.enabled=false
spring.liquibase.enabled=false
spring.jpa.show-sql=true